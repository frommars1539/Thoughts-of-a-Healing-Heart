<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healing Journal Entries</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Healing Journal Entries</h1>
    <div id="entriesContainer"></div>
    <br>
    <a id="button" href="index.html">Back to Journal</a>
</body>
<script>
    // Load saved entries when the page loads
    window.onload = function() {
        const savedEntries = JSON.parse(localStorage.getItem("entries")) || [];
        savedEntries.forEach(text => {
            const entryDiv = document.createElement("div");
            entryDiv.textContent = text;
            entryDiv.style.marginBottom = "10px";
            entryDiv.style.padding = "10px";
            entryDiv.style.border = "1px solid #a45d7f";
            entryDiv.style.borderRadius = "8px";
            entryDiv.style.backgroundColor = "#fefefe";
            document.getElementById("entriesContainer").appendChild(entryDiv);
        });
    };
</script>
</html></content>
